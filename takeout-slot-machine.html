<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>今天吃什么 - 外卖老虎机</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { font-size: 1.8em; text-align: center; margin-bottom: 10px; color: #333; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 0.9em; }
        
        .slot-machine {
            background: linear-gradient(180deg, #c0392b, #8e44ad);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            border: 5px solid #f39c12;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .slot-window {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 30px 20px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #f39c12;
        }
        .slot-item {
            font-size: 2em;
            font-weight: bold;
            color: #f39c12;
            text-align: center;
        }
        .slot-item.spinning { animation: spin 0.1s infinite; }
        .slot-item.winner { animation: celebrate 0.4s infinite alternate; color: #e74c3c; }
        @keyframes spin { 50% { opacity: 0.5; } }
        @keyframes celebrate { 0% { transform: scale(1.1); } 100% { transform: scale(1.2); } }
        
        .spin-btn {
            width: 100%;
            background: linear-gradient(180deg, #f39c12, #e67e22);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.3em;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            margin: 20px 0;
        }
        .spin-btn:disabled { background: #95a5a6; cursor: not-allowed; }
        
        .options-section { margin-top: 25px; }
        .options-section h3 { color: #333; margin-bottom: 10px; font-size: 1em; }
        .options-input {
            width: 100%;
            min-height: 100px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .options-hint { color: #888; font-size: 0.8em; margin-top: 8px; }
        
        .stats { display: flex; justify-content: center; gap: 30px; margin-top: 20px; padding-top: 20px; border-top: 2px solid #eee; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.5em; font-weight: bold; color: #667eea; }
        .stat-label { color: #888; font-size: 0.8em; }
        
        .result-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            padding: 30px 50px;
            border-radius: 25px;
            font-size: 2em;
            font-weight: bold;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            z-index: 1000;
            transition: transform 0.5s;
        }
        .result-popup.show { transform: translate(-50%, -50%) scale(1); }
        
        .confetti { position: fixed; width: 8px; height: 8px; animation: fall 2.5s forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 今天吃什么</h1>
        <p class="subtitle">专治选择困难症</p>
        
        <div class="slot-machine">
            <div class="slot-window">
                <div class="slot-item" id="slotItem">🎰 准备</div>
            </div>
        </div>
        
        <button class="spin-btn" id="spinBtn" onclick="spin()">🎲 开始选择</button>
        
        <div class="options-section">
            <h3>⚙️ 自定义选项</h3>
            <textarea class="options-input" id="optionsInput">麻辣烫
黄焖鸡米饭
肯德基
麦当劳
披萨
寿司
烧烤
汉堡
炸鸡
拉面
炒饭
盖浇饭
沙拉
轻食
火锅
酸菜鱼
烤鱼
小龙虾
牛排
三明治</textarea>
            <p class="options-hint">每行一个，自动保存</p>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="spinCount">0</div>
                <div class="stat-label">选择次数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="optionCount">20</div>
                <div class="stat-label">选项数</div>
            </div>
        </div>
    </div>
    
    <div class="result-popup" id="resultPopup"></div>

    <script>
        let isSpinning = false;
        let spinCount = parseInt(localStorage.getItem('spinCount')) || 0;
        let options = [];
        
        function init() {
            const saved = localStorage.getItem('takeoutOptions');
            if (saved) document.getElementById('optionsInput').value = saved;
            updateOptions();
            document.getElementById('spinCount').textContent = spinCount;
        }
        
        function updateOptions() {
            options = document.getElementById('optionsInput').value.split('\n').filter(l => l.trim());
            localStorage.setItem('takeoutOptions', document.getElementById('optionsInput').value);
            document.getElementById('optionCount').textContent = options.length;
        }
        
        document.getElementById('optionsInput').addEventListener('input', updateOptions);
        
        function spin() {
            if (isSpinning || options.length === 0) return;
            isSpinning = true;
            const slotItem = document.getElementById('slotItem');
            const spinBtn = document.getElementById('spinBtn');
            
            spinBtn.disabled = true;
            spinBtn.textContent = '🎰 选择中...';
            slotItem.classList.add('spinning');
            
            let speed = 80, elapsed = 0;
            const interval = setInterval(() => {
                slotItem.textContent = options[Math.floor(Math.random() * options.length)];
                elapsed += speed;
                if (elapsed > 2000) speed += 30;
                if (elapsed >= 3500) {
                    clearInterval(interval);
                    const result = options[Math.floor(Math.random() * options.length)];
                    slotItem.textContent = result;
                    slotItem.classList.remove('spinning');
                    slotItem.classList.add('winner');
                    spinBtn.disabled = false;
                    spinBtn.textContent = '🎲 再选一次';
                    isSpinning = false;
                    spinCount++;
                    localStorage.setItem('spinCount', spinCount);
                    document.getElementById('spinCount').textContent = spinCount;
                    showResult(result);
                    createConfetti();
                }
            }, speed);
        }
        
        function showResult(result) {
            const popup = document.getElementById('resultPopup');
            popup.textContent = '🎉 就吃 ' + result + '！';
            popup.classList.add('show');
            setTimeout(() => popup.classList.remove('show'), 2500);
        }
        
        function createConfetti() {
            const colors = ['#f00', '#0f0', '#00f', '#ff0', '#f39c12'];
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'confetti';
                    c.style.left = Math.random() * 100 + 'vw';
                    c.style.background = colors[Math.floor(Math.random() * colors.length)];
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 3000);
                }, i * 50);
            }
        }
        
        init();
    </script>
</body>
</html>
