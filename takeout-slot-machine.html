<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎰 今天吃什么 - 外卖老虎机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            padding: 25px 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.8em;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 0.95em;
        }

        /* 老虎机主体 */
        .slot-machine {
            position: relative;
            background: linear-gradient(180deg, #c0392b 0%, #8e44ad 50%, #2c3e50 100%);
            border-radius: 25px;
            padding: 25px;
            margin: 20px 0;
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.5),
                0 0 0 10px #f39c12,
                0 0 0 15px #e74c3c,
                0 0 80px rgba(243, 156, 18, 0.6);
            border: 5px solid #f39c12;
        }

        .slot-machine::before {
            content: '🎰 LUCKY EAT 🎰';
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5em;
            font-weight: bold;
            color: #f39c12;
            text-shadow: 0 0 15px #f39c12, 0 0 25px #e74c3c;
            white-space: nowrap;
        }

        .slot-window {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 15px;
            padding: 30px 20px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            box-shadow: 
                inset 0 5px 20px rgba(0, 0, 0, 0.8),
                0 0 20px rgba(243, 156, 18, 0.4);
            border: 3px solid #f39c12;
        }

        .slot-reel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            height: 150px;
            overflow: hidden;
        }

        .reel-strip {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
            will-change: transform;
        }

        .reel-item {
            font-size: 2em;
            font-weight: bold;
            background: linear-gradient(180deg, #f39c12 0%, #e74c3c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px 15px;
        }

        .slot-item {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(180deg, #f39c12 0%, #e74c3c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            filter: drop-shadow(0 0 15px rgba(243, 156, 18, 0.6));
            min-width: 250px;
            position: relative;
            z-index: 10;
        }

        .slot-item.spinning {
            animation: spinBlur 0.1s linear infinite;
        }

        .slot-item.winner {
            animation: winnerCelebrate 0.4s ease-in-out infinite alternate;
        }

        @keyframes spinBlur {
            0%, 100% { filter: blur(5px); opacity: 0.7; }
            50% { filter: blur(2px); opacity: 0.9; }
        }

        @keyframes winnerCelebrate {
            0% { transform: scale(1.2) rotate(-5deg); }
            100% { transform: scale(1.2) rotate(5deg); }
        }

        .win-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(243, 156, 18, 0.6) 0%, transparent 70%);
            animation: glowPulse 0.6s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        @keyframes glowPulse {
            0% { opacity: 0.4; }
            100% { opacity: 0.8; }
        }

        /* 拉杆 */
        .lever-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 15px 0;
        }

        .lever {
            width: 15px;
            height: 80px;
            background: linear-gradient(90deg, #8e44ad 0%, #9b59b6 100%);
            border-radius: 8px;
            position: relative;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
        }

        .lever::before {
            content: '🔴';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5em;
        }

        .lever.pulling {
            animation: leverPull 0.4s ease-in-out;
        }

        @keyframes leverPull {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(25deg); }
        }

        /* 按钮 */
        .spin-btn {
            position: relative;
            background: linear-gradient(180deg, #f39c12 0%, #e67e22 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.4em;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 
                0 8px 25px rgba(243, 156, 18, 0.4),
                inset 0 3px 10px rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0;
            text-shadow: 0 2px 3px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .spin-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.2) 50%, transparent 70%);
            transform: rotate(45deg);
            animation: btnShine 3s ease-in-out infinite;
        }

        @keyframes btnShine {
            0%, 100% { transform: translateX(-100%) rotate(45deg); }
            50% { transform: translateX(100%) rotate(45deg); }
        }

        .spin-btn:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.03);
        }

        .spin-btn:active:not(:disabled) {
            transform: translateY(2px) scale(0.98);
        }

        .spin-btn:disabled {
            background: linear-gradient(180deg, #95a5a6 0%, #7f8c8d 100%);
            cursor: not-allowed;
        }

        /* 选项区域 */
        .options-section {
            margin-top: 25px;
            text-align: left;
        }

        .options-section h3 {
            color: #333;
            margin-bottom: 12px;
            font-size: 1.1em;
        }

        .options-input {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        .options-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .options-hint {
            color: #888;
            font-size: 0.85em;
            margin-top: 8px;
        }

        /* 统计 */
        .stats {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #888;
            font-size: 0.85em;
        }

        /* 弹窗 */
        .result-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0) rotate(-10deg);
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 40px 60px;
            border-radius: 30px;
            font-size: 2.5em;
            font-weight: bold;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 80px rgba(240, 147, 251, 0.6);
            z-index: 1000;
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            text-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
            border: 4px solid rgba(255, 255, 255, 0.4);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
        }

        .result-popup.show {
            transform: translate(-50%, -50%) scale(1) rotate(0deg);
            opacity: 1;
            pointer-events: auto;
        }

        .result-popup.hide {
            transform: translate(-50%, -50%) scale(0.5) rotate(10deg);
            opacity: 0;
        }

        /* 粒子效果 */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            animation: confettiFall 2.5s ease-out forwards;
            z-index: 998;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .footer {
            margin-top: 20px;
            color: #888;
            font-size: 0.8em;
        }

        /* 移动端优化 */
        @media (max-width: 480px) {
            h1 { font-size: 1.5em; }
            .subtitle { font-size: 0.85em; }
            .slot-machine { padding: 20px 15px; }
            .slot-machine::before { font-size: 1.2em; top: -35px; }
            .slot-window { padding: 25px 15px; min-height: 120px; }
            .slot-item { font-size: 2em; min-width: 200px; }
            .reel-item { font-size: 1.6em; min-height: 50px; }
            .spin-btn { padding: 15px 40px; font-size: 1.2em; }
            .container { padding: 20px 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 今天吃什么</h1>
        <p class="subtitle">专治选择困难症的外卖老虎机</p>

        <div class="slot-machine">
            <div class="slot-window">
                <div class="slot-reel">
                    <div class="reel-strip" id="reelStrip"></div>
                    <div class="slot-item" id="slotItem">🎰 准备</div>
                    <div class="win-glow" id="winGlow"></div>
                </div>
            </div>
        </div>

        <div class="lever-container">
            <div class="lever" id="lever"></div>
        </div>

        <button class="spin-btn" id="spinBtn" onclick="spin()">🎲 开始选择</button>

        <div class="options-section">
            <h3>⚙️ 自定义外卖选项</h3>
            <textarea 
                class="options-input" 
                id="optionsInput" 
                placeholder="输入你的外卖选项..."
            >麻辣烫
黄焖鸡米饭
肯德基
麦当劳
披萨
寿司
烧烤
汉堡
炸鸡
拉面
炒饭
盖浇饭
沙拉
轻食
火锅
酸菜鱼
烤鱼
小龙虾
牛排
三明治</textarea>
            <p class="options-hint">💡 每行一个选项，修改后自动保存</p>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="spinCount">0</div>
                <div class="stat-label">今日选择次数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="optionCount">20</div>
                <div class="stat-label">可选外卖数</div>
            </div>
        </div>

        <p class="footer">💋 Made with love by Hailey for Jacy</p>
    </div>

    <div class="result-popup" id="resultPopup"></div>

    <script>
        let isSpinning = false;
        let spinCount = parseInt(localStorage.getItem('takeoutSpinCount')) || 0;
        let options = [];

        function init() {
            updateSpinCount();
            loadOptions();
            updateOptionCount();
        }

        function loadOptions() {
            const saved = localStorage.getItem('takeoutOptions');
            if (saved) {
                document.getElementById('optionsInput').value = saved;
            }
            updateOptions();
        }

        function updateOptions() {
            const text = document.getElementById('optionsInput').value;
            options = text.split('\n').filter(line => line.trim());
            localStorage.setItem('takeoutOptions', text);
            updateOptionCount();
        }

        document.getElementById('optionsInput').addEventListener('input', () => {
            updateOptions();
        });

        function updateOptionCount() {
            document.getElementById('optionCount').textContent = options.length;
        }

        function updateSpinCount() {
            document.getElementById('spinCount').textContent = spinCount;
        }

        function spin() {
            if (isSpinning) return;
            if (options.length === 0) {
                alert('请先添加一些外卖选项哦！');
                return;
            }

            isSpinning = true;
            const slotItem = document.getElementById('slotItem');
            const spinBtn = document.getElementById('spinBtn');
            const lever = document.getElementById('lever');
            const winGlow = document.getElementById('winGlow');
            const reelStrip = document.getElementById('reelStrip');
            
            lever.classList.add('pulling');
            setTimeout(() => lever.classList.remove('pulling'), 400);
            
            spinBtn.disabled = true;
            spinBtn.textContent = '🎰 选择中...';
            slotItem.classList.add('spinning');
            slotItem.classList.remove('winner');
            winGlow.style.display = 'none';
            
            // 创建滚动食物
            reelStrip.innerHTML = '';
            const totalItems = 25;
            for (let i = 0; i < totalItems; i++) {
                const randomIndex = Math.floor(Math.random() * options.length);
                const item = document.createElement('div');
                item.className = 'reel-item';
                item.textContent = options[randomIndex];
                reelStrip.appendChild(item);
            }
            
            // 滚动动画
            let currentPosition = 0;
            const itemHeight = 50;
            const totalHeight = totalItems * itemHeight;
            let speed = 12;
            let elapsed = 0;
            const totalDuration = 3500;
            
            const scrollInterval = setInterval(() => {
                elapsed += 100;
                
                if (elapsed > totalDuration * 0.3) speed *= 0.92;
                if (elapsed > totalDuration * 0.7) speed *= 0.85;
                
                currentPosition += speed;
                if (currentPosition >= totalHeight) currentPosition = 0;
                
                reelStrip.style.transform = `translateY(-${currentPosition}px)`;
                
                const currentIndex = Math.floor(currentPosition / itemHeight) % options.length;
                slotItem.textContent = options[currentIndex];

                if (elapsed >= totalDuration) {
                    clearInterval(scrollInterval);
                    const finalIndex = Math.floor(Math.random() * options.length);
                    slotItem.textContent = options[finalIndex];
                    reelStrip.innerHTML = '';
                    slotItem.classList.remove('spinning');
                    slotItem.classList.add('winner');
                    winGlow.style.display = 'block';
                    spinBtn.disabled = false;
                    spinBtn.textContent = '🎲 再选一次';
                    isSpinning = false;
                    
                    spinCount++;
                    localStorage.setItem('takeoutSpinCount', spinCount);
                    updateSpinCount();
                    
                    showResult(options[finalIndex]);
                    createConfetti();
                }
            }, 100);
        }

        function showResult(result) {
            const popup = document.getElementById('resultPopup');
            popup.innerHTML = `🎉 就吃<br/><span style="font-size: 0.5em; display: block; margin-top: 15px;">${result}</span>！`;
            popup.classList.remove('hide');
            popup.classList.add('show');
            
            setTimeout(() => {
                popup.classList.remove('show');
                popup.classList.add('hide');
            }, 2500);
        }

        function createConfetti() {
            const colors = ['#f00', '#0f0', '#00f', '#ff0', '#0ff', '#f0f', '#f90', '#90f', '#fff', '#f39c12'];
            
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 40);
            }
        }

        init();
    </script>
</body>
</html>
